<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DayGuide – Offline</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(135deg, #E3F2FD 0%, #F3E5F5 40%, #FFF3E0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2D3748;
    }
    .container {
      background: white;
      border-radius: 32px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: #718096; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #4A90D9, #6BA5E7);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Quicksand', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }
    .info {
      margin-top: 24px;
      padding: 14px;
      background: #F7FAFC;
      border-radius: 12px;
      font-size: 12px;
      color: #A0AEC0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Keine Verbindung</h1>
    <p>
      DayGuide benötigt eine Internetverbindung, um deine Tagespläne zu laden.
      Bitte überprüfe deine Verbindung und versuche es erneut.
    </p>
    <button class="btn" onclick="window.location.reload()">
      🔄 Erneut versuchen
    </button>
    <div class="info">
      <strong>Tipp:</strong> Wenn du die App vorher geöffnet hattest,
      werden deine Tagespläne möglicherweise aus dem Cache geladen,
      sobald du die Seite neu lädst.
    </div>
  </div>
</body>
</html>
