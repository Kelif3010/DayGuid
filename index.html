<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#4A90D9" />
  <meta name="background-color" content="#F8F9FA" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="DayGuide" />
  <meta name="application-name" content="DayGuide" />
  <meta name="msapplication-TileColor" content="#4A90D9" />
  
  <!-- Icons -->
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <title>DayGuide</title>
  
  <style>
    /* Prevent pull-to-refresh and overscroll on Android */
    html, body { 
      overscroll-behavior: none; 
      -webkit-overflow-scrolling: touch;
      touch-action: manipulation;
    }
    body { 
      margin: 0; 
      font-family: 'Quicksand', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    /* Splash screen while app loads */
    #splash {
      position: fixed; inset: 0; z-index: 99999;
      background: linear-gradient(135deg, #E3F2FD 0%, #F3E5F5 40%, #FFF3E0 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Quicksand', sans-serif;
    }
    #splash .icon { font-size: 64px; margin-bottom: 16px; }
    #splash h1 { font-size: 28px; font-weight: 700; color: #2D3748; margin: 0; }
    #splash p { font-size: 14px; color: #718096; margin-top: 8px; }
    #splash .loader { 
      width: 40px; height: 40px; margin-top: 24px;
      border: 4px solid #E2E8F0; border-top-color: #4A90D9;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <div class="icon">📋</div>
      <h1>DayGuide</h1>
      <p>Wird geladen...</p>
      <div class="loader"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
